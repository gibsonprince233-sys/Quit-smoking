name: Android CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        
      # 2. Fix corrupt gradle-wrapper.jar (AI-generated projects)
      - name: Fix gradle-wrapper.jar
        run: |
          echo "📦 Fixing gradle-wrapper.jar..."
          rm -f gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar
          
      # 3. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # 4. Make Gradle executable
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
        
      # 5. Cache Gradle dependencies
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
            
      # 6. Run lint check (optional but recommended)
      - name: Run lint check
        run: ./gradlew lintDebug --no-daemon
        
      # 7. Run unit tests (optional)
      - name: Run tests
        run: ./gradlew testDebug --no-daemon
        
      # 8. Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        
      # 9. Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          
      # 10. Build Release AAB (requires secrets)
      - name: Build Release AAB
        if: github.ref == 'refs/heads/main' && secrets.KEYSTORE_BASE64 != ''
        run: ./gradlew bundleRelease --no-daemon
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_STORE_FILE: ${{ secrets.KEYSTORE_PATH || 'keystore.jks' }}
          
      # 11. Upload Release AAB
      - name: Upload Release AAB
        if: github.ref == 'refs/heads/main' && secrets.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 7
          
      # 12. Clean up Gradle cache (optional)
      - name: Clean up Gradle cache
        run: |
          rm -rf ~/.gradle/caches/modules-2/modules-2.lock
          rm -rf ~/.gradle/caches/*/plugin-resolution/
